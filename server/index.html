<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mall Code</title>
        <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
        <link href="css/prism.css" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>
        <script>
            const App = {}
        </script>

        <div id="cover">
            <img id="image" src="img/image.jpg">
        </div>

        <div id="top-left" class="corner flex-row-center">
            <div id="sound-toggle" class="hud-button" title="Click to lower or mute">🔊</div>
            <div id="username-info" class="hud-text" title="The user that is talking right now"></div>
            <div id="echo" class="hud-text hidden" title="The zone echoes"></div>
        </div>

        <div id="top-right" class="corner flex-column-center">
            <div id="top-right-top" class="flex-row-center">
                <div id="zone-info" class="hud-text"></div>

                <div id="zone-name" class="hud-text"></div>

                <div id="zone-dials">
                    <button id="zone-dial-letter" class="dial" title="Zone Letter"></button>
                    <button id="zone-dial-speed" class="dial" title="Zone Speed"></button>
                </div>

                <canvas id="zone-map-icon" title="Zone Map"></canvas>
            </div>

            <div id="top-right-below" class="flex-row-center">
                <div id="updates"></div>
            </div>
        </div>

        <div id="words-container"></div>

        <div id="bottom-right" class="corner flex-row-center">
            <div id="settings" class="hud-button hud-text glow">Settings</div>
            <div id="about" class="hud-button hud-text glow">About</div>
        </div>

		<template id="info-template">
			<div id="info">
				<div id="global-count-container" class="info-item" title="How many users are online globally">
					<div class="info-label">Online:</div>
					<div id="global-count" class="info-value"></div>
				</div>

				<div class="separator">|</div>

				<div id="zone-count-container" class="info-item">
					<div class="info-label">Here:</div>
					<div id="zone-count" class="info-value"></div>
				</div>
			</div>
		</template>

        <template id="message-template">
            <div id="message-container"></div>
        </template>

        <template id="settings-template">
            <div id="settings-container">
                <div id="settings-editor" class="language-toml"></div>
                <button id="save-settings-btn" class="modal-btn">Save</button>
            </div>
        </template>

        <template id="zone-map-template">
            <div id="zone-map-container">
                <div id="zone-map-sekrit-row" class="flex-row-center"></div>
                <div id="zone-map-grid"></div>
            </div>
        </template>

        <canvas id="glcanvas"></canvas>
        <script src="js/libs.bundle.js"></script>
        <script src="js/main.bundle.js"></script>

        <script>
            window.onload = () => {
                App.init()
            }
        </script>
    </body>
</html>
