<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mall Code</title>
        <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <script>
            const App = {}
        </script>

        <div id="cover">
            <img id="image" src="image.jpg">
        </div>

        <div id="top-left" class="corner">
            <div id="sound-toggle" class="hud-button" title="Click to lower or mute">🔊</div>
            <div id="username-info" class="hud-text" title="The user that is talking right now"></div>
        </div>

        <div id="top-right" class="corner">
            <div id="zone-info" class="hud-text" title="How many users are online in the current zone"></div>

            <div id="zone-dials">
                <select id="zone-dial-letter" class="dial" title="Zone Letter"></select>
                <select id="zone-dial-speed" class="dial" title="Zone Speed"></select>
            </div>

            <div id="zone-map" class="hud-button" title="Zone Map">🔳</div>
        </div>

        <div id="modal-overlay" class="hidden">
            <div id="modal-content"></div>
        </div>

        <div id="menu">?</div>

		<template id="info-template">
			<div id="info">
				<div class="info-item">
					<div class="info-label">Online:</div>
					<div id="global-count" class="info-value"></div>
				</div>

				<div class="separator">|</div>

				<div class="info-item">
					<div class="info-label">Here:</div>
					<div id="zone-count" class="info-value"></div>
				</div>
			</div>
		</template>

        <canvas id="glcanvas"></canvas>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script src="js/dom.js"></script>
        <script src="js/shared.js"></script>
        <script src="js/base.js"></script>
        <script src="js/sound.js"></script>

        <script>
            window.onload = () => {
                App.init()
            }
        </script>
    </body>
</html>
